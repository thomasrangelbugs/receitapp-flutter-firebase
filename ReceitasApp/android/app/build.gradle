plugins {
    id "com.android.application"
    id "kotlin-android"
    // O plugin do Flutter precisa ser aplicado depois dos plugins Android/Kotlin.
    id "dev.flutter.flutter-gradle-plugin"
    // Integracao com o Firebase.
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

android {
    namespace = "br.diaboirl.receitasapp"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "br.diaboirl.receitasapp"
        // firebase_auth exige minSdk 23 ou superior.
        minSdk = 23
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
        multiDexEnabled = true
    }

    buildTypes {
        release {
            // Assina com a chave de debug para permitir `flutter run --release`.
            // Em producao, configure sua propria chave de assinatura.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

name: receitapp
description: Aplicativo de receitas culinarias com Flutter + Firebase.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # Estado e navegacao
  provider: ^6.0.0
  go_router: ^14.0.0

  # Recursos
  audioplayers: ^6.0.0 # alarme sonoro do timer
  uuid: ^4.0.0 # ids unicos dos documentos
  intl: ^0.19.0 # formatacao de datas em pt_BR
  google_fonts: ^6.2.0 # tipografia do tema

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
